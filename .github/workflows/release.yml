name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build binary
        env:
          TAG: ${{ github.ref_name }}
        run: |
          CGO_ENABLED=0 go build \
            -ldflags "-X main.version=$TAG" \
            -o bolt ./cmd/bolt/

      - name: Package tarball
        env:
          TAG: ${{ github.ref_name }}
        run: |
          mkdir -p bolt-linux-amd64
          cp bolt bolt-linux-amd64/
          cp packaging/bolt.desktop bolt-linux-amd64/
          cp packaging/bolt.service bolt-linux-amd64/
          cp images/icon.png bolt-linux-amd64/appicon.png
          tar czf "bolt-linux-amd64-${TAG}.tar.gz" bolt-linux-amd64/

      - name: Generate changelog
        env:
          TAG: ${{ github.ref_name }}
        run: |
          # Find the previous tag
          PREV_TAG=$(git tag --sort=-version:refname | grep -A1 "^${TAG}$" | tail -1)
          if [ "$PREV_TAG" = "$TAG" ] || [ -z "$PREV_TAG" ]; then
            # First release — use all commits
            RANGE="$TAG"
          else
            RANGE="${PREV_TAG}..${TAG}"
          fi

          {
            echo "## Changelog"
            echo ""
            git log "$RANGE" --pretty=format:"* [\`%h\`](https://github.com/fhsinchy/bolt/commit/%H) %s" --no-merges
            echo ""
          } > changelog.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          gh release create "$TAG" \
            --title "$TAG" \
            --notes-file changelog.md \
            "bolt-linux-amd64-${TAG}.tar.gz"
