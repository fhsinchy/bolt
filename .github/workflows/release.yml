name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Build frontend
        run: cd frontend && pnpm install && pnpm build

      - name: Build binary
        env:
          TAG: ${{ github.ref_name }}
        run: |
          CGO_ENABLED=1 go build \
            -tags desktop,production,webkit2_41 \
            -ldflags "-X main.version=$TAG" \
            -o bolt ./cmd/bolt/

      - name: Package tarball
        env:
          TAG: ${{ github.ref_name }}
        run: |
          mkdir -p bolt-linux-amd64
          cp bolt bolt-linux-amd64/
          cp packaging/bolt.desktop bolt-linux-amd64/
          cp packaging/bolt.service bolt-linux-amd64/
          cp build/appicon.png bolt-linux-amd64/
          tar czf "bolt-linux-amd64-${TAG}.tar.gz" bolt-linux-amd64/

      - name: Build browser extensions
        run: make build-extension

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          gh release create "$TAG" \
            --title "$TAG" \
            --generate-notes \
            "bolt-linux-amd64-${TAG}.tar.gz#Bolt Linux amd64" \
            dist/bolt-capture-chrome.zip#"Chrome Extension" \
            dist/bolt-capture-firefox.zip#"Firefox Extension"
