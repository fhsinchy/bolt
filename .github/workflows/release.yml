name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build binaries
        env:
          TAG: ${{ github.ref_name }}
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          CGO_ENABLED=0 go build \
            -ldflags "-X main.version=$TAG" \
            -o bolt ./cmd/bolt/
          CGO_ENABLED=0 go build \
            -ldflags "-X main.version=$TAG" \
            -o bolt-host ./cmd/bolt-host/

      - name: Package tarball
        env:
          TAG: ${{ github.ref_name }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          dir="bolt-linux-${GOARCH}"
          mkdir -p "$dir"
          cp bolt bolt-host "$dir/"
          cp packaging/bolt.desktop packaging/bolt.service "$dir/"
          cp packaging/com.fhsinchy.bolt.json "$dir/"
          cp images/icon.png "$dir/appicon.png"
          tar czf "${dir}-${TAG}.tar.gz" "$dir/"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: tarball-${{ matrix.goarch }}
          path: bolt-linux-${{ matrix.goarch }}-${{ github.ref_name }}.tar.gz

  publish:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Generate changelog
        env:
          TAG: ${{ github.ref_name }}
        run: |
          # Find the previous tag
          PREV_TAG=$(git tag --sort=-version:refname | grep -A1 "^${TAG}$" | tail -1)
          if [ "$PREV_TAG" = "$TAG" ] || [ -z "$PREV_TAG" ]; then
            # First release — use all commits
            RANGE="$TAG"
          else
            RANGE="${PREV_TAG}..${TAG}"
          fi

          {
            echo "## Changelog"
            echo ""
            git log "$RANGE" --pretty=format:"* [\`%h\`](https://github.com/fhsinchy/bolt/commit/%H) %s" --no-merges
            echo ""
          } > changelog.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          gh release create "$TAG" \
            --title "$TAG" \
            --notes-file changelog.md \
            "bolt-linux-amd64-${TAG}.tar.gz" \
            "bolt-linux-arm64-${TAG}.tar.gz"
